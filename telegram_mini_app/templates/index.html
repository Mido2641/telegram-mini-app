<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Dashboard</title>
</head>

<body style="font-family:Arial; background:#111; color:white; text-align:center;">

<h2>📊 Exam Dashboard</h2>

<input id="name" placeholder="اسم الامتحان"><br><br>
<input id="time" placeholder="الوقت"><br><br>

<button onclick="send()">إنشاء امتحان</button>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function send(){
    tg.sendData(JSON.stringify({
        name: document.getElementById("name").value,
        time: document.getElementById("time").value
    }));
}
</script>

</body>
</html>
